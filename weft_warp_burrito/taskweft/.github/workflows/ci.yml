name: Taskweft CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: taskweft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      # Every dependency is Hex-sourced now (no more git: deps) — a version
      # bump always changes mix.lock's hash, so exact-match caching on both
      # deps/ and _build is safe: Hex's version-based resolution (unlike a
      # git dep's commit sha) is exactly what mix.lock's hash captures, so
      # there's no way to hit a stale-but-cache-key-matching build.
      #
      # No restore-keys: a prefix-match fallback could otherwise restore a
      # tree from an older, different mix.lock. Only ever restore on an
      # exact hash match; anything else gets a correct, fresh checkout/build.
      - name: Cache Mix deps + _build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-taskweft-build-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds C++20 NIF via elixir_make)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace

  lean:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Lean (elan)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: false
          test: false
          lint: false

      - name: lake build
        working-directory: lean
        run: lake build
