repos:
  - repo: local
    hooks:
      - id: mix-format
        name: "elixir: mix format"
        entry: mix format --check-formatted
        language: system
        files: \.exs*$

      - id: mix-compile
        name: "elixir: mix compile"
        entry: mix compile --force --warnings-as-errors
        language: system
        pass_filenames: false
        files: \.ex$

      - id: mix-credo
        name: "elixir: mix credo"
        entry: mix credo --min-priority high
        language: system
        pass_filenames: false
        files: \.exs*$

      - id: check-spdx
        name: "license: SPDX headers"
        entry: python3 scripts/check_spdx.py
        language: system
        files: \.(ex|exs|scm)$
        exclude: ^(deps|_build)/

      - id: format-lisp
        name: "s7 scheme: reindent (c_src/s7/fixtures/*.scm)"
        entry: python3 scripts/format_lisp.py --check
        language: system
        files: \.scm$

      - id: format-lean
        name: "lean: style (scripts/format_lean.py)"
        entry: python3 scripts/format_lean.py --check
        language: system
        files: \.lean$
        exclude: ^lean/\.lake/

      - id: lean-build
        name: "lean: lake build"
        entry: bash -c 'cd lean && lake build'
        language: system
        pass_filenames: false
        files: \.lean$
