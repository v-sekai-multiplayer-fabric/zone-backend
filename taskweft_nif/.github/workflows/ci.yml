name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: gcc
          - os: macos-latest
            toolchain: clang
          # windows-latest currently maps to a win25-vs2026 image that
          # erlef/setup-beam@v1 does not yet recognize (see
          # https://github.com/erlef/setup-beam — only win19 / win22 / win25
          # are accepted as ImageOS values). Pin to windows-2022 until the
          # action is updated.
          - os: windows-2022
            toolchain: mingw
          - os: windows-2022
            toolchain: msvc

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      # Split into a cached install + a PATH-registration step: choco install
      # itself is the slow part (~45s), and the mingw toolchain changes rarely
      # enough that a static cache key is fine — bump the key if it ever needs
      # to pick up a newer choco mingw package.
      - name: Cache mingw-w64
        if: matrix.toolchain == 'mingw'
        id: cache-mingw
        uses: actions/cache@v4
        with:
          path: |
            C:\ProgramData\mingw64
            C:\tools\mingw64
          key: windows-2022-mingw-w64-v1

      - name: Install mingw-w64
        if: matrix.toolchain == 'mingw' && steps.cache-mingw.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install mingw --no-progress -y

      - name: Add mingw-w64 to PATH
        if: matrix.toolchain == 'mingw'
        shell: pwsh
        run: |
          $mingwBin = (Get-ChildItem 'C:\ProgramData\mingw64', 'C:\tools\mingw64' -Filter 'mingw32-make.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).Directory.FullName
          if (-not $mingwBin) { throw 'mingw32-make.exe not found after install' }
          Add-Content -Path $env:GITHUB_PATH -Value $mingwBin

      - name: Setup MSVC
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: mix deps.get
        run: mix deps.get

      - name: mix compile
        run: mix compile

      - name: Verify NIF artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: test -f priv/libtaskweft_nif.so

      - name: Verify NIF artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path 'priv\libtaskweft_nif.dll')) { throw 'libtaskweft_nif.dll missing' }

      - name: mix test
        run: mix test
