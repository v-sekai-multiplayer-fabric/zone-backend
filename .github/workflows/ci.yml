name: Zone Backend CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: zone-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      TEST_DATABASE_URL: "postgresql://root@localhost:26257/vsekai_test?sslmode=disable"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-zone-backend-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-zone-backend-mix-

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb \
            -p 26257:26257 -p 8080:8080 \
            ghcr.io/v-sekai/cockroach:latest \
            start-single-node --insecure
          timeout 120 bash -c 'until docker exec crdb cockroach sql --insecure -e "SELECT 1" 2>/dev/null; do sleep 1; done'

      - name: Create test database
        run: docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS vsekai_test;"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: |
          mix ecto.migrate
          mix run priv/repo/test_seeds.exs
          mix test --trace

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-zone-backend-dialyzer-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-zone-backend-dialyzer-

      - name: Dialyzer
        run: mix dialyzer
