name: Taskweft CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: taskweft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-taskweft-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-taskweft-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds C++20 NIF via elixir_make)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace

  lean:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Lean (elan)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: false
          test: false
          lint: false

      - name: lake build
        working-directory: lean
        run: lake build
