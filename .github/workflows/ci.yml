name: Taskweft CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: taskweft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      # Cache fetched dep sources only, not _build: mix will not recompile a
      # git dep whose app version is unchanged even when its locked sha moves,
      # so a cached _build silently runs a stale NIF against new domains. The
      # C++20 NIF build is quick, so compiling fresh each run keeps it correct.
      #
      # No restore-keys: a prefix-match fallback can restore a deps/ tree from
      # an older mix.lock whose git deps (e.g. taskweft_nif) are pinned to a
      # different commit than the current lock — `mix deps.get` does not
      # reliably detect and fix that mismatch on its own, so a stale NIF
      # silently gets compiled and tested. Only ever restore on an exact
      # mix.lock hash match; anything else gets a correct, fresh checkout.
      - name: Cache Mix deps
        uses: actions/cache@v6
        with:
          path: deps
          key: ${{ runner.os }}-taskweft-deps-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds C++20 NIF via elixir_make)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test --trace

  lean:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Lean (elan)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: false
          test: false
          lint: false

      - name: lake build
        working-directory: lean
        run: lake build
