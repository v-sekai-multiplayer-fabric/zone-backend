name: Taskweft Release

# Build the standalone Burrito binary per triplet and attach each to the
# GitHub release for the pushed tag (issue #53).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: burrito ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # macOS Burrito builds currently hit a zig/libSystem link issue
    # (undefined _sigemptyset/_waitpid) — kept non-blocking so the Linux and
    # Windows binaries still build and attach. Tracked under #53.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each triplet builds on a native runner so the C++20 NIF compiles
          # for that OS/arch rather than being cross-compiled. `zig` is the
          # Zig 0.15.2 archive basename that Burrito's backend needs.
          - target: windows_amd64
            os: windows-latest
            ext: ".exe"
            zig: zig-x86_64-windows-0.15.2
            zig_ext: zip
          - target: linux_amd64
            os: ubuntu-latest
            ext: ""
            zig: zig-x86_64-linux-0.15.2
            zig_ext: tar.xz
          - target: macos_arm64
            os: macos-latest
            ext: ""
            zig: zig-aarch64-macos-0.15.2
            zig_ext: tar.xz
            experimental: true

    env:
      MIX_ENV: prod
      TASKWEFT_BURRITO: "1"
      BURRITO_TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Ensure xz is available (Burrito compresses the payload with it)
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Windows)
              # xz ships with the runner's preinstalled MSYS2.
              echo "C:\msys64\usr\bin" >> "$GITHUB_PATH"
              "/c/msys64/usr/bin/xz.exe" --version
              ;;
            Linux)
              sudo apt-get update -qq && sudo apt-get install -y xz-utils
              xz --version
              ;;
            macOS)
              brew list xz >/dev/null 2>&1 || brew install xz
              xz --version
              ;;
          esac

      - name: Set up Zig 0.15.2 (Burrito backend)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o "zig.${{ matrix.zig_ext }}" \
            "https://ziglang.org/download/0.15.2/${{ matrix.zig }}.${{ matrix.zig_ext }}"
          if [ "${{ matrix.zig_ext }}" = "zip" ]; then
            unzip -q "zig.${{ matrix.zig_ext }}"
          else
            tar xf "zig.${{ matrix.zig_ext }}"
          fi
          echo "$PWD/${{ matrix.zig }}" >> "$GITHUB_PATH"
          "$PWD/${{ matrix.zig }}/zig" version

      - name: Stamp the build commit
        shell: bash
        run: echo "TASKWEFT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: mix deps.get

      - name: Build standalone binary
        run: mix release taskweft --overwrite

      - name: Smoke test (version + plan through the bundled NIF)
        shell: bash
        run: |
          set -euo pipefail
          bin="burrito_out/taskweft_${{ matrix.target }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          # Redirect stdin from /dev/null and bound with `timeout` so a stray
          # read can never hang the job; `version` self-extracts on first run.
          timeout 120 "$bin" version </dev/null | grep -E "^taskweft [0-9]+\.[0-9]+\.[0-9]+"
          # `plan` exercises the bundled NIF loading from the self-extract dir.
          timeout 120 "$bin" plan priv/smoke/blocks_world.jsonld </dev/null | grep -E '^\[\['

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskweft_${{ matrix.target }}
          path: burrito_out/taskweft_${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: burrito_out/taskweft_${{ matrix.target }}${{ matrix.ext }}
