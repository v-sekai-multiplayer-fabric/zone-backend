name: build-image

# Build and publish the uro (zone-backend) container image to ghcr.io.
# Consumed by v-sekai-multiplayer-fabric/infra via the gateway_image / uro_image
# tofu variable.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "fly.toml"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/v-sekai-multiplayer-fabric/zone-backend
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=zone-backend
          cache-to: type=gha,mode=max,scope=zone-backend
