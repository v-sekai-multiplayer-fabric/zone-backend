name: Taskweft Release

# Build the standalone Burrito binaries and attach each to the GitHub release
# for the pushed tag (issue #53).
#
# Build strategy (see scripts/build-standalone.sh):
#   * Linux host cross-compiles linux_amd64 + macos_arm64 with zig. macOS links
#     against zig's bundled libSystem stubs, which a native macOS runner's SDK
#     does not provide cleanly.
#   * Windows builds natively — Burrito's CopyERTS step can't lay out the
#     Windows ERTS from a non-Windows host.
#   * A macOS runner then *runs* the cross-built macOS binary to prove the NIF
#     loads before it is attached. Nothing is masked.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-macos:
    name: build linux + macos (zig cross)
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true" # sccache caches the NIF compile via GitHub cache
    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Install xz (Burrito payload compression)
        run: sudo apt-get update -qq && sudo apt-get install -y xz-utils

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # Cache only deps — NOT _build. Caching _build across releases keyed on
      # mix.lock (which rarely changes) restored stale compiled beams, so a
      # mix.exs @version bump never made it into the built binary (both the
      # CLI version string and Burrito's per-version extraction cache key
      # stayed at the old version). A fresh _build each run keeps the version
      # honest; the expensive NIF C++ compile is still cached via sccache.
      - name: Cache mix deps
        uses: actions/cache@v6
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Cache zig + Burrito downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/zig-0.15.2
            ~/.cache/burrito_file_cache
          key: ${{ runner.os }}-burrito-zig-0.15.2

      - name: Build linux_amd64 + macos_arm64 (smoke linux)
        env:
          TASKWEFT_SMOKE: "1"
        run: bash scripts/build-standalone.sh linux_amd64 macos_arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskweft-linux-macos
          path: |
            burrito_out/taskweft_linux_amd64
            burrito_out/taskweft_macos_arm64
          if-no-files-found: error

      - name: Attach linux binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: burrito_out/taskweft_linux_amd64

  macos-validate:
    name: validate + attach macos
    needs: linux-macos
    runs-on: macos-latest
    timeout-minutes: 15 # backstop; macOS has no `timeout` command
    steps:
      - uses: actions/checkout@v7 # provides priv/smoke/blocks_world.jsonld

      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          name: taskweft-linux-macos
          path: burrito_out

      - name: Smoke test the macOS binary (NIF must load)
        run: |
          set -euo pipefail
          bin="burrito_out/taskweft_macos_arm64"
          chmod +x "$bin"
          # No `timeout` on macOS; main/1 always halts and </dev/null blocks
          # any stray stdin read, so these cannot hang.
          "$bin" version </dev/null >/dev/null            # pre-warm self-extract
          "$bin" version </dev/null | grep -E "^taskweft [0-9]+\.[0-9]+\.[0-9]+"
          "$bin" plan priv/smoke/blocks_world.jsonld </dev/null | grep -E '^\[\['

      - name: Attach macos binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: burrito_out/taskweft_macos_arm64

  windows:
    name: build windows (native)
    runs-on: windows-latest
    env:
      MIX_ENV: prod
      TASKWEFT_BURRITO: "1"
      BURRITO_TARGET: windows_amd64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Ensure xz (from preinstalled MSYS2)
        shell: bash
        run: |
          set -euo pipefail
          echo "C:\msys64\usr\bin" >> "$GITHUB_PATH"
          "/c/msys64/usr/bin/xz.exe" --version

      # Cache only deps — NOT _build. Caching _build across releases keyed on
      # mix.lock (which rarely changes) restored stale compiled beams, so a
      # mix.exs @version bump never made it into the built binary (both the
      # CLI version string and Burrito's per-version extraction cache key
      # stayed at the old version). A fresh _build each run keeps the version
      # honest; the expensive NIF C++ compile is still cached via sccache.
      - name: Cache mix deps
        uses: actions/cache@v6
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Set up Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o zig.zip "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip"
          unzip -q zig.zip
          # pwd -W gives the Windows-form path the pwsh build step can resolve.
          echo "$(pwd -W)/zig-x86_64-windows-0.15.2" >> "$GITHUB_PATH"
          "$(pwd -W)/zig-x86_64-windows-0.15.2/zig" version

      - name: Stamp the build commit
        shell: bash
        run: echo "TASKWEFT_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: mix deps.get

      - name: Build standalone binary
        run: mix release taskweft --overwrite

      - name: Smoke test (version + plan through the bundled NIF)
        shell: bash
        run: |
          set -euo pipefail
          bin="burrito_out/taskweft_windows_amd64.exe"
          timeout 180 "$bin" version </dev/null >/dev/null            # pre-warm self-extract
          timeout 60 "$bin" version </dev/null | grep -E "^taskweft [0-9]+\.[0-9]+\.[0-9]+"
          timeout 60 "$bin" plan priv/smoke/blocks_world.jsonld </dev/null | grep -E '^\[\['

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskweft-windows
          path: burrito_out/taskweft_windows_amd64.exe
          if-no-files-found: error

      - name: Attach windows binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: burrito_out/taskweft_windows_amd64.exe
